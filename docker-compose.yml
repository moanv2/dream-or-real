services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite:////data/dream_or_real.db
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000,https://moanv2.github.io}
      STORIES_DIR: /stories
      MEDIA_DIR: /data/media
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-3-pro-image-preview}
      SCRAPER_USER_AGENT: "${SCRAPER_USER_AGENT:-dream-or-real/0.1 (contact: maintainer@example.com)}"
      SCRAPE_LIMIT_PER_SUB: ${SCRAPE_LIMIT_PER_SUB:-50}
      SCRAPE_DELAY_SECONDS: ${SCRAPE_DELAY_SECONDS:-2}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./stories:/stories:ro
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
