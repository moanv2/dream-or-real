services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite:////data/dream_or_real.db
      FRONTEND_ORIGIN: http://localhost:3000
      STORIES_DIR: /stories
      MEDIA_DIR: /data/media
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-3-pro-image-preview}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./stories:/stories:ro
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
